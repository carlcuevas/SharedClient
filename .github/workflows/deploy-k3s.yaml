name: Deploy to K3s con Rollback Automatico

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  tests:
    name: Ejecutar tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

  build-and-push:
    name: Build y push Docker
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen
        run: |
          IMAGE_TAG=${GITHUB_REF_NAME:-latest}
          docker build -t ttzeta00/demo-api:$IMAGE_TAG -t ttzeta00/demo-api:latest .
          docker push ttzeta00/demo-api:$IMAGE_TAG
          docker push ttzeta00/demo-api:latest

  deploy:
    name: Deploy a K3s
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem

      - name: Copiar manifiestos al servidor
        run: |
          scp -o StrictHostKeyChecking=no -i /tmp/key.pem \
            k8s/deployment.yaml k8s/service.yaml \
            ubuntu@${{ secrets.EC2_HOST }}:/tmp/

      - name: Deploy to k3s
        id: deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/key.pem ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            export KUBECONFIG=/home/ubuntu/.kube/config
            kubectl apply -f /tmp/deployment.yaml
            kubectl apply -f /tmp/service.yaml
            kubectl rollout status deployment/demo-api --timeout=60s
          ENDSSH

      - name: Rollback automatico
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/key.pem ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            export KUBECONFIG=/home/ubuntu/.kube/config
            echo "Deploy fallo - ejecutando rollback automatico..."
            kubectl rollout undo deployment/demo-api
            kubectl rollout status deployment/demo-api --timeout=60s
            echo "Rollback completado"
            kubectl get pods -l app=demo-api
          ENDSSH
